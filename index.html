<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N.S COUTURE - Portfolio</title>
    
    <!-- Tailwind CSS pour la mise en page -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM pour la logique interactive -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel pour compiler le JSX directement dans le navigateur -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Styles globaux -->
    <style>
        @keyframes marquee {
          0% { transform: translateX(0%); }
          100% { transform: translateX(-50%); }
        }
        .animate-marquee-custom {
            animation: marquee 15s linear infinite;
        }
        body {
          cursor: none; /* Masque le curseur par défaut */
          background-color: #030303;
          /* Cacher la barre de défilement pour un look Awwwards immersif */
          -ms-overflow-style: none;
          scrollbar-width: none; 
        }
        body::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Le point d'ancrage de notre application React -->
    <div id="root"></div>

    <!-- Le code de l'application -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Icône SVG
        const ArrowDownRightIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <line x1="7" y1="7" x2="17" y2="17"></line>
                <polyline points="17 7 17 17 7 17"></polyline>
            </svg>
        );

        const App = () => {
          const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
          const [isHovering, setIsHovering] = useState(false);

          // INERTIE GLOBALE (LOCOMOTIVE SCROLL EFFECT)
          useEffect(() => {
            let currentY = window.scrollY;
            let targetY = window.scrollY;
            let ease = 0.04; // Poids de l'inertie (plus c'est bas, plus c'est lourd et lent)
            let requestRef = null;

            const updateScroll = () => {
                const maxScroll = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight) - window.innerHeight;
                targetY = Math.max(0, Math.min(targetY, maxScroll));
                
                currentY += (targetY - currentY) * ease;
                window.scrollTo(0, currentY);
                
                // Continue l'animation jusqu'à stabilisation
                if (Math.abs(targetY - currentY) > 0.5) {
                    requestRef = requestAnimationFrame(updateScroll);
                } else {
                    currentY = targetY; // Forcer l'alignement parfait à la fin
                    requestRef = null;
                }
            };

            const onWheel = (e) => {
                // Seulement sur desktop (les mobiles ont déjà une inertie native parfaite)
                if (window.innerWidth > 768) {
                    e.preventDefault();
                    targetY += e.deltaY * 1.5; // Multiplicateur de distance par coup de molette
                    
                    if (!requestRef) {
                        requestRef = requestAnimationFrame(updateScroll);
                    }
                }
            };

            const onNavScroll = (e) => {
                targetY = e.detail;
                if (!requestRef) {
                    requestRef = requestAnimationFrame(updateScroll);
                }
            };

            window.addEventListener('wheel', onWheel, { passive: false });
            window.addEventListener('customNavScroll', onNavScroll);

            return () => {
                window.removeEventListener('wheel', onWheel);
                window.removeEventListener('customNavScroll', onNavScroll);
                if (requestRef) cancelAnimationFrame(requestRef);
            };
          }, []);

          // DÉCLENCHEUR DE DÉFILEMENT POUR LA NAVIGATION
          const handleSlowScroll = (e, targetId) => {
            e.preventDefault();
            const target = document.getElementById(targetId);
            if (!target) return;
            const targetPosition = target.getBoundingClientRect().top + window.scrollY;
            // Diffuse l'événement pour que le moteur d'inertie prenne le relai
            window.dispatchEvent(new CustomEvent('customNavScroll', { detail: targetPosition }));
          };

          useEffect(() => {
            const handleMouseMove = (e) => {
              setMousePos({ x: e.clientX, y: e.clientY });
            };
            window.addEventListener('mousemove', handleMouseMove);
            return () => window.removeEventListener('mousemove', handleMouseMove);
          }, []);

          return (
            <div className="bg-[#030303] min-h-screen text-neutral-200 font-sans selection:bg-pink-500 selection:text-white overflow-x-hidden">
              
              {/* CURSEUR AWWWARDS-STYLE (Mix Blend Difference) */}
              <div 
                className="pointer-events-none fixed top-0 left-0 z-[100] rounded-full transition-transform duration-100 ease-out mix-blend-difference flex items-center justify-center"
                style={{
                  transform: `translate(${mousePos.x - (isHovering ? 30 : 6)}px, ${mousePos.y - (isHovering ? 30 : 6)}px)`,
                  width: isHovering ? '60px' : '12px',
                  height: isHovering ? '60px' : '12px',
                  backgroundColor: 'white',
                }}
              >
                {isHovering && <span className="text-black text-[8px] font-black uppercase tracking-widest">Voir</span>}
              </div>

              {/* NAVIGATION MINIMALISTE */}
              <nav className="fixed top-0 w-full p-6 md:p-10 flex justify-between items-start z-50 mix-blend-difference text-white">
                <div className="text-sm font-medium tracking-tight">
                  N.S COUTURE <br />
                  <span className="text-neutral-400 font-mono text-[10px] uppercase tracking-widest">Par @__nimzzzz__ &mdash; Dijon, FR</span>
                </div>
                <div className="text-right text-sm font-medium uppercase tracking-tight flex flex-col items-end gap-1">
                  <a href="#labo-couture" onClick={(e) => handleSlowScroll(e, 'labo-couture')} className="hover:italic transition-all">Labo Couture</a>
                  <a href="#labo-mailles" onClick={(e) => handleSlowScroll(e, 'labo-mailles')} className="hover:italic transition-all">Labo Mailles</a>
                  <a href="#portfolio" onClick={(e) => handleSlowScroll(e, 'portfolio')} className="hover:italic transition-all">Le Projet</a>
                </div>
              </nav>

              {/* HERO SECTION - RESTRUCTURED (Editorial Style) */}
              <section className="relative h-screen w-full overflow-hidden flex items-center bg-[#030303]">
                {/* Lignes de structure (Grid brutaliste) */}
                <div className="absolute inset-0 pointer-events-none flex justify-between px-6 md:px-10 z-0 opacity-20">
                  <div className="w-[1px] h-full bg-neutral-800"></div>
                  <div className="w-[1px] h-full bg-neutral-800 hidden md:block"></div>
                  <div className="w-[1px] h-full bg-neutral-800 hidden lg:block"></div>
                  <div className="w-[1px] h-full bg-neutral-800"></div>
                </div>

                {/* Image Editoriale Flottante */}
                <div 
                  className="absolute right-[-10%] md:right-[5%] lg:right-[15%] top-[15%] md:top-[10%] w-[80vw] md:w-[45vw] lg:w-[30vw] aspect-[3/4] bg-neutral-900 z-0 opacity-50 md:opacity-80 transition-transform duration-700 ease-out"
                  onMouseEnter={() => setIsHovering(true)} 
                  onMouseLeave={() => setIsHovering(false)}
                >
                  <div className="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1618331835717-801e976710b2?q=80&w=2000&auto=format&fit=crop')] bg-cover bg-center grayscale contrast-[1.2] opacity-80 mix-blend-overlay"></div>
                  {/* Légende tournée à 90 degrés */}
                  <div className="absolute bottom-4 right-[-1.5rem] font-mono text-[10px] text-neutral-400 tracking-widest uppercase origin-bottom-right -rotate-90">
                    [ ARCHIVE_01.MP4 ]
                  </div>
                </div>

                {/* Grand Titre (Mix Blend Difference pour chevaucher l'image) - Taille réduite */}
                <div className="relative z-10 w-full px-6 md:px-10 pointer-events-none mix-blend-difference text-white flex flex-col justify-center h-full mt-20 md:mt-0">
                  <h1 className="text-[14vw] md:text-[10vw] font-black leading-[0.75] tracking-tighter uppercase flex flex-col">
                    <span className="ml-[-1vw]">Textile</span>
                    <span className="font-serif italic font-light tracking-tight ml-[6vw] md:ml-[12vw] text-pink-500 lowercase">manifeste</span>
                  </h1>
                </div>

                {/* Éléments du bas */}
                <div className="absolute bottom-10 left-6 md:left-10 z-20 max-w-[200px] md:max-w-[250px]">
                  <p className="font-mono text-[10px] text-neutral-400 uppercase tracking-widest leading-relaxed border-l border-pink-500 pl-3">
                    La mode au point de convergence des luttes.
                  </p>
                </div>
                
                <div className="absolute bottom-10 right-6 md:right-10 z-20 flex-row items-center gap-4 hidden md:flex">
                   <span className="font-mono text-[10px] text-neutral-500 uppercase tracking-widest">Découvrir</span>
                   <div className="w-16 h-[1px] bg-neutral-500"></div>
                </div>
              </section>

              {/* MANIFESTE - SCROLL ASYMÉTRIQUE */}
              <section id="labo-couture" className="py-32 px-6 md:px-20 relative">
                <div className="max-w-6xl mx-auto flex flex-col md:flex-row gap-20">
                  
                  {/* Colonne Gauche (Texte) */}
                  <div className="flex-1 space-y-32 pt-20">
                    <div>
                      <p className="font-mono text-[10px] text-neutral-500 uppercase tracking-widest mb-6 border-b border-neutral-800 pb-2 inline-block">
                        01 &mdash; Labo Couture
                      </p>
                      <p className="text-2xl md:text-4xl font-medium leading-tight">
                        &quot;La cravate : détourner un symbole du <span className="text-blue-500 italic font-serif">patriarcat</span> pour s&apos;en <span className="text-pink-500 italic font-serif">émanciper</span>.&quot;
                      </p>
                    </div>

                    <div>
                      <p className="font-mono text-[10px] text-neutral-500 uppercase tracking-widest mb-6 border-b border-neutral-800 pb-2 inline-block">
                        02 &mdash; Jupe Signature
                      </p>
                      <p className="text-2xl md:text-4xl font-medium leading-tight text-neutral-400">
                        &quot;Mosaïque sensée inspirée de la <span className="text-yellow-400 text-white italic font-serif">créolisation</span>, de la fusion des peuples, des cultures et <span className="text-lime-400 italic font-serif text-white">des genres</span>.&quot;
                      </p>
                    </div>
                  </div>

                  {/* Colonne Droite (Images flottantes collages) */}
                  <div className="flex-1 relative min-h-[100vh]">
                    <div 
                      className="w-[70%] aspect-square bg-neutral-900 absolute top-[10%] right-0 z-10 rotate-3 border-2 border-dashed border-neutral-700"
                      onMouseEnter={() => setIsHovering(true)} onMouseLeave={() => setIsHovering(false)}
                    >
                      <span className="absolute bottom-4 right-4 font-mono text-[10px] text-neutral-500">[ DÉTOURNE_CRAVATE.JPG ]</span>
                      <div className="absolute top-4 left-4 w-12 h-12 rounded-full bg-pink-500 mix-blend-screen blur-md"></div>
                    </div>
                    
                    <div 
                      className="w-[60%] aspect-[4/5] bg-neutral-800 absolute top-[40%] left-[-5%] z-20 border border-[#030303] -rotate-6"
                      onMouseEnter={() => setIsHovering(true)} onMouseLeave={() => setIsHovering(false)}
                    >
                      <span className="absolute bottom-4 left-4 font-mono text-[10px] text-neutral-400">[ CROQUIS_JUPE_SIGNATURE.PNG ]</span>
                    </div>
                  </div>
                </div>
              </section>

              {/* MARQUEE BRUTALISTE (Outline text) */}
              <div className="w-full py-20 overflow-hidden flex bg-pink-500 text-[#030303]">
                <div className="whitespace-nowrap animate-marquee-custom flex items-center gap-12 font-black text-6xl md:text-9xl uppercase tracking-tighter">
                  <span className="italic font-serif font-light">Labo Mailles</span>
                  <span>&mdash;</span>
                  <span>Déchets Actuels</span>
                  <span>&mdash;</span>
                  <span className="italic font-serif font-light text-white">Gisements Futurs</span>
                  <span>&mdash;</span>
                  <span>Labo Mailles</span>
                  <span>&mdash;</span>
                  <span>Déchets Actuels</span>
                  <span>&mdash;</span>
                  <span className="italic font-serif font-light text-white">Gisements Futurs</span>
                </div>
              </div>

              {/* PHILOSOPHIE - FULL SCREEN QUOTE */}
              <section className="min-h-screen flex items-center justify-center p-6 md:p-20 text-center relative">
                <div className="absolute inset-0 bg-blue-600 mix-blend-color z-0 opacity-10"></div>
                <h2 className="text-4xl md:text-7xl lg:text-8xl font-black uppercase tracking-tighter leading-[0.85] z-10">
                  &quot;Après deux ans à <br/>
                  <span className="text-transparent font-serif italic font-light" style={{ WebkitTextStroke: '1px #3b82f6' }}>imaginer</span> <br/>
                  le pull parfait.&quot;
                </h2>
              </section>

              {/* MOODBOARD / ARCHIVES (Grille déstructurée) */}
              <section id="labo-mailles" className="py-32 px-6 md:px-10">
                <div className="mb-20">
                  <h3 className="text-sm font-mono uppercase tracking-widest text-neutral-500 border-b border-neutral-800 pb-4">Labo Mailles &amp; Accessoires</h3>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-12 gap-y-20 md:gap-6 relative">
                  
                  {/* Item 1 */}
                  <div className="md:col-span-5 md:mt-20 group" onMouseEnter={() => setIsHovering(true)} onMouseLeave={() => setIsHovering(false)}>
                    <div className="aspect-[4/5] bg-neutral-900 relative overflow-hidden transition-transform duration-700 ease-out group-hover:scale-[0.98] rotate-2">
                      <div className="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent z-10"></div>
                      <span className="absolute top-4 left-4 font-mono text-[10px] text-white z-20 mix-blend-difference">[ PULL_PATCHWORK_MULTICOLORE.JPG ]</span>
                      <div className="absolute bottom-6 left-6 z-20">
                        <h4 className="text-2xl font-bold uppercase tracking-tighter text-yellow-400">Mon Premier Pull</h4>
                        <p className="font-mono text-[10px] text-neutral-300 mt-2 max-w-[80%] uppercase">Tantôt de tâtonnements, tantôt de designs.</p>
                      </div>
                    </div>
                  </div>

                  {/* Item 2 */}
                  <div className="md:col-span-7 group" onMouseEnter={() => setIsHovering(true)} onMouseLeave={() => setIsHovering(false)}>
                    <div className="aspect-[16/9] bg-neutral-800 relative overflow-hidden transition-transform duration-700 ease-out group-hover:scale-[0.98] -rotate-1">
                       <span className="absolute top-4 left-4 font-mono text-[10px] text-white z-20 mix-blend-difference">[ DENIM_UPCYCLING_FLEURS.JPG ]</span>
                       <div className="absolute bottom-6 right-6 z-20 text-right">
                        <h4 className="text-2xl font-bold uppercase tracking-tighter text-blue-500">Upcycling Denim</h4>
                        <p className="font-mono text-[10px] text-neutral-300 mt-2 ml-auto max-w-[60%] uppercase">Jeans retravaillés avec fleurs en crochet et épingles.</p>
                      </div>
                    </div>
                  </div>

                  {/* Item 3 */}
                  <div className="md:col-span-6 md:col-start-4 md:mt-[-10%] group z-30" onMouseEnter={() => setIsHovering(true)} onMouseLeave={() => setIsHovering(false)}>
                    <div className="aspect-square bg-[#111] border border-neutral-800 relative overflow-hidden transition-transform duration-700 ease-out group-hover:scale-[0.98] rotate-3 shadow-2xl">
                       <div className="absolute inset-0 flex items-center justify-center p-12 text-center">
                         <p className="text-xl md:text-3xl font-serif italic text-neutral-400 leading-snug">
                           &quot;Pochettes en <span className="text-lime-400">cravates tressées</span> et sac en <span className="text-pink-500">élastiques de chantier</span>.&quot;
                         </p>
                       </div>
                       <span className="absolute bottom-4 left-4 font-mono text-[10px] text-neutral-600">[ ACCESSOIRES_LABO.PNG ]</span>
                    </div>
                  </div>

                </div>
              </section>

              {/* FOOTER ÉDITORIAL (Orienté Portfolio) */}
              <footer id="portfolio" className="h-screen flex flex-col justify-between p-6 md:p-10 bg-neutral-950">
                <div className="flex flex-col md:flex-row justify-between items-start mt-20 gap-10">
                  <div className="max-w-xl">
                    <h2 className="text-3xl md:text-5xl font-medium leading-tight mb-8">
                      Une démarche <br/>
                      <span className="font-serif italic text-pink-500">artistique</span>, avant tout.
                    </h2>
                    <p className="font-mono text-[12px] text-neutral-500 uppercase tracking-widest leading-relaxed">
                      Ce portfolio est une archive vivante de mes expérimentations. Une vitrine de la mode au point de convergence des luttes, pensée non pas comme un produit, mais comme un message.
                    </p>
                  </div>

                  {/* Liens secondaires (Focus Portfolio & Découverte) */}
                  <div className="flex flex-col gap-4 text-right mt-12 md:mt-0 z-50">
                    <a href="https://www.instagram.com/n.scouture/" target="_blank" rel="noreferrer" className="text-2xl md:text-4xl uppercase tracking-tighter hover:text-pink-500 transition-colors font-bold relative inline-block">
                      Instagram <span className="font-serif italic font-light">&rarr;</span>
                    </a>
                  </div>
                </div>

                {/* Huge bottom text */}
                <div className="w-full text-center overflow-hidden relative">
                  {/* Abstract Graphic Element inspired by the logo */}
                  <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-yellow-400/10 blur-3xl rounded-full z-0 pointer-events-none"></div>
                  
                  <h1 className="text-[16vw] font-black leading-[0.7] tracking-tighter text-neutral-900 select-none relative z-10 whitespace-nowrap">
                    N.S COUTURE
                  </h1>
                  <div className="flex justify-between items-center mt-4 font-mono text-[10px] text-neutral-600 uppercase tracking-widest relative z-10">
                    <span>&copy; 2026</span>
                    <span>Convergence des luttes</span>
                    <span>FRANCE</span>
                  </div>
                </div>
              </footer>

            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
